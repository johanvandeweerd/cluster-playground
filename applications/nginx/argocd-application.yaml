apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/johan-vandeweerd-hs/cluster-playground
    path: applications/nginx
    targetRevision: observability
    helm:
      valuesObject:
        domainName: ${domainName}
        projectName: ${projectName}
  destination:
    server: ${clusterArn}
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
