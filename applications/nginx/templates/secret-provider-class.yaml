apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: nginx
spec:
  secretObjects:
    - secretName: nginx
      type: Opaque
      data:
        - objectName: mySecrets
          key: test
  provider: aws
  parameters:
    objects: |
      - objectType: secretsmanager
        objectName: {{ .Values.projectName }}/nginx
        objectAlias: mySecrets
    usePodIdentity: "true"
