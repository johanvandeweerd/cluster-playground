apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencost
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/johan-vandeweerd-hs/cluster-playground
    path: applications/opencost
    targetRevision: eks-auto
    helm:
      valuesObject:
        aws:
          accountId: '{{ .Values.aws.accountId }}'
          region: {{ .Values.aws.region }}
        athena:
          bucket: {{ .Values.athena.bucket }}
          workgroup: {{ .Values.athena.workgroup }}
          database: {{ .Values.athena.database }}
          table: {{ .Values.athena.table }}
        opencost:
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/path: "/metrics"
            prometheus.io/port: "9003"

          opencost:
            cloudIntegrationSecret: cloud-costs
            cloudCost:
              enabled: true

            exporter:
              image:
                pullPolicy: Always

            prometheus:
              internal:
                enabled: false
              amp:
                enabled: true
                workspaceId: {{ .Values.prometheus.workspaceId }}

            ui:
              ingress:
                enabled: true
                ingressClassName: ingress
                hosts:
                  - host: opencost.{{ .Values.domainName }}
                    paths:
                      - /
            sigV4Proxy:
              imagePullPolicy: Always
              region: {{ .Values.aws.region }}
              host: aps-workspaces.{{ .Values.aws.region }}.amazonaws.com
  destination:
    server: {{ .Values.cluster.arn }}
    namespace: opencost
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
