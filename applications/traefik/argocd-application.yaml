apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/johan-vandeweerd-hs/cluster-playground
    path: applications/traefik
    targetRevision: observability
    helm:
      valuesObject:
        targetGroupArn: ${targetGroupArn}
        traefik:
          additionalArguments:
            # Allow accessing the dashboard at http://localhost:9000/dashboard/ when using port-forward
            - --api.insecure=true
            # Skip TLS verification for backends with self-signed certificates
            - --serverstransport.insecureskipverify=true
            # Force Traefik to set a hostname on the status field of Ingress resources to stop Argocd from marking ingress
            # resources as "Progressing".
            - --providers.kubernetesingress.ingressendpoint.hostname=${hostName}
  destination:
    server: ${clusterArn}
    namespace: traefik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
