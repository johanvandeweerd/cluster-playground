apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: open-telemetry-logs
spec:
  mode: daemonset
  managementState: managed
  serviceAccount: open-telemetry-logs-collector
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.namespace
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.name
    - name: K8S_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "k8s.pod.name=$(K8S_POD_NAME),k8s.namespace.name=$(K8S_NAMESPACE),k8s.node.name=$(K8S_NODE_NAME),host.name=$(K8S_NODE_NAME),k8s.node.ip=$(K8S_NODE_IP),k8s.pod.ip=$(K8S_POD_IP),k8s.cluster.name=johan"
    - name: GRAFANA_CLOUD_API_KEY
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_API_KEY
          name: open-telemetry
    - name: GRAFANA_CLOUD_BASIC_AUTH_HEADER
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_BASIC_AUTH_HEADER
          name: open-telemetry
    - name: GRAFANA_CLOUD_INSTANCE_ID
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_INSTANCE_ID
          name: open-telemetry
    - name: GRAFANA_CLOUD_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_OTLP_ENDPOINT
          name: open-telemetry
  priorityClassName: system-node-critical
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 512Mi
  volumes:
    - name: container-logs
      hostPath:
        path: /var/log/pods
  volumeMounts:
    - name: container-logs
      mountPath: /var/log/pods
      readOnly: true
  securityContext:
    runAsGroup: 0
    runAsUser: 0
  config:
    connectors:
      grafanacloud/connector:
        host_identifiers:
          - host.id
          - k8s.node.uid
          - k8s.node.name
    extensions:
      basicauth/grafana_cloud:
        client_auth:
          username: ${env:GRAFANA_CLOUD_INSTANCE_ID}
          password: ${env:GRAFANA_CLOUD_API_KEY}
      file_storage:
        directory: /var/lib/otelcol
        create_directory: true
      k8s_observer:
        auth_type: serviceAccount
        node: ${env:K8S_NODE_NAME}
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
          - id: container-parser
            type: container
        retry_on_failure:
          enabled: true
        start_at: end
        storage: file_storage
    processors:
      batch:
        send_batch_max_size: 1500
        send_batch_size: 1000
        timeout: 1s
      k8sattributes:
        extract:
          labels:
            - from: pod
              key: app.kubernetes.io/instance
              tag_name: k8s.app.instance
            - from: pod
              key: app.kubernetes.io/component
              tag_name: k8s.app.component
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.container.name
            - k8s.cronjob.name
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - container.image.tag
            - container.image.name
            - k8s.cluster.uid
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
          otel_annotations: true
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
              - from: resource_attribute
                name: k8s.node.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: connection
      resource/hostname:
        attributes:
          - action: insert
            from_attribute: k8s.node.name
            key: host.name
      resourcedetection/env:
        detectors:
          - env
          - k8snode
        override: false
        timeout: 2s
    exporters:
      otlp_http/grafana_cloud:
        auth:
          authenticator: basicauth/grafana_cloud
        endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    service:
      extensions:
        - basicauth/grafana_cloud
        - file_storage
        - k8s_observer
      pipelines:
        logs:
          receivers:
            - filelog
          processors:
            - k8sattributes
            - resourcedetection/env
            - resource/hostname
            - batch
          exporters:
            - otlp_http/grafana_cloud
      telemetry:
        logs:
          processors:
            - batch:
                exporter:
                  otlp:
                    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}/v1/logs
                    headers:
                      - name: authorization
                        value: ${env:GRAFANA_CLOUD_BASIC_AUTH_HEADER}
                    protocol: http/protobuf
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: '0.0.0.0'
                    port: 8888
        resource:
          host.name: ${env:K8S_NODE_NAME}
          k8s.namespace.name: ${env:K8S_NAMESPACE}
          k8s.node.name: ${env:K8S_NODE_NAME}
          k8s.node.ip: ${env:K8S_NODE_IP}
          k8s.pod.name: ${env:K8S_POD_NAME}
          k8s.pod.ip: ${env:K8S_POD_IP}
