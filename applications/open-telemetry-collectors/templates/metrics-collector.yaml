apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: open-telemetry-metrics
spec:
  mode: statefulset
  managementState: managed
  serviceAccount: open-telemetry-metrics-collector
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: K8S_NAMESPACE
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.namespace
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.name
    - name: K8S_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "k8s.pod.name=$(K8S_POD_NAME),k8s.namespace.name=$(K8S_NAMESPACE),k8s.node.name=$(K8S_NODE_NAME),host.name=$(K8S_NODE_NAME),k8s.node.ip=$(K8S_NODE_IP),k8s.pod.ip=$(K8S_POD_IP),k8s.cluster.name=johan"
    - name: GRAFANA_CLOUD_API_KEY
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_API_KEY
          name: open-telemetry
    - name: GRAFANA_CLOUD_BASIC_AUTH_HEADER
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_BASIC_AUTH_HEADER
          name: open-telemetry
    - name: GRAFANA_CLOUD_INSTANCE_ID
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_INSTANCE_ID
          name: open-telemetry
    - name: GRAFANA_CLOUD_OTLP_ENDPOINT
      valueFrom:
        secretKeyRef:
          key: GRAFANA_CLOUD_OTLP_ENDPOINT
          name: open-telemetry
  priorityClassName: system-node-critical
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 512Mi
  podAnnotations:
    prometheus.io/scrape: "false"
  autoscaler:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 50
    targetMemoryUtilization: 60
  topologySpreadConstraints:
    - topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule
      minDomains: 3
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: open-telemetry-metrics-collector
    - topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: open-telemetry-metrics-collector
  targetAllocator:
    enabled: true
  config:
    connectors:
      grafanacloud/connector:
        host_identifiers:
          - host.id
          - k8s.node.uid
          - k8s.node.name
    extensions:
      basicauth/grafana_cloud:
        client_auth:
          username: ${env:GRAFANA_CLOUD_INSTANCE_ID}
          password: ${env:GRAFANA_CLOUD_API_KEY}
      k8s_observer:
        auth_type: serviceAccount
        node: ${env:K8S_NODE_NAME}
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 30s
            scrape_timeout: 10s
          scrape_configs:
            - job_name: cadvisor
              kubernetes_sd_configs:
                - role: node
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                - replacement: kubernetes.default.svc:443
                  target_label: __address__
                - source_labels: [ __meta_kubernetes_node_name ]
                  target_label: __metrics_path__
                  regex: (.+)
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
              metric_relabel_configs:
                - source_labels: [ pod ]
                  regex: ([a-z\-]+)\-[a-z0-9]+(\-[a-z0-9]+)?$
                  replacement: $1
                  target_label: deployment
            - job_name: pods
              honor_labels: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - action: keep
                  source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_scrape ]
                  regex: true
                - action: drop
                  source_labels: [ __meta_kubernetes_pod_phase ]
                  regex: Pending|Succeeded|Failed|Completed

                - action: replace
                  source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_scheme ]
                  regex: (https?)
                  target_label: __scheme__
                - action: replace
                  source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip ]
                  regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
                  replacement: '[$2]:$1'
                  target_label: __address__
                - action: replace
                  source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip ]
                  regex: (\d+);((([0-9]+?)(\.|$)){4})
                  replacement: $2:$1
                  target_label: __address__
                - action: replace
                  source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_path ]
                  regex: (.+)
                  target_label: __metrics_path__±
    #              metric_relabel_configs:
    #                - action: keep
    #                  source_labels: [ __name__ ]
    #                  regex: my_metric_name_prefix_.*
    processors:
      batch:
        send_batch_max_size: 1500
        send_batch_size: 1000
        timeout: 1s
      k8sattributes:
        extract:
          labels:
            - from: pod
              key: app.kubernetes.io/instance
              tag_name: k8s.app.instance
            - from: pod
              key: app.kubernetes.io/component
              tag_name: k8s.app.component
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.container.name
            - k8s.cronjob.name
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - container.image.tag
            - container.image.name
            - k8s.cluster.uid
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
          otel_annotations: true
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
              - from: resource_attribute
                name: k8s.node.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: connection
      resource/hostname:
        attributes:
          - action: insert
            from_attribute: k8s.node.name
            key: host.name
      resourcedetection/env:
        detectors:
          - env
          - k8snode
        override: false
        timeout: 2s
    exporters:
      otlp_http/grafana_cloud:
        auth:
          authenticator: basicauth/grafana_cloud
        endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    service:
      extensions:
        - basicauth/grafana_cloud
        - k8s_observer
      pipelines:
        metrics:
          receivers:
            - prometheus
          processors:
            - k8sattributes
            - resourcedetection/env
            - resource/hostname
            - batch
          exporters:
            - otlp_http/grafana_cloud
      telemetry:
        logs:
          processors:
            - batch:
                exporter:
                  otlp:
                    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}/v1/logs
                    headers:
                      - name: authorization
                        value: ${env:GRAFANA_CLOUD_BASIC_AUTH_HEADER}
                    protocol: http/protobuf
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}/v1/metrics
                    headers:
                      - name: authorization
                        value: ${env:GRAFANA_CLOUD_BASIC_AUTH_HEADER}
                    protocol: http/protobuf
        resource:
          host.name: ${env:K8S_NODE_NAME}
          k8s.namespace.name: ${env:K8S_NAMESPACE}
          k8s.node.name: ${env:K8S_NODE_NAME}
          k8s.node.ip: ${env:K8S_NODE_IP}
          k8s.pod.name: ${env:K8S_POD_NAME}
          k8s.pod.ip: ${env:K8S_POD_IP}
