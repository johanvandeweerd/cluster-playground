apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: message-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/johan-vandeweerd-hs/cluster-playground
    path: applications/message-service
    targetRevision: observability
  destination:
    server: ${clusterArn}
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
