apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/johan-vandeweerd-hs/cluster-playground
    path: applications/platform
    targetRevision: observability
    helm:
      valuesObject:
        clusterName: ${clusterName}
  destination:
    server: ${clusterArn}
    namespace: kube-public
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
